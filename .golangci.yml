run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  disable-all: true
  enable:
    # Code quality
    - bodyclose
    - contextcheck
    - dupl
    - errcheck
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gomoddirectives
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nestif
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  gofmt:
    simplify: true
  govet:
    check-shadowing: true
  misspell:
    locale: US
  nolintlint:
    require-explanation: true
    require-specific: true
  staticcheck:
    checks:
      - all
  stylecheck:
    checks:
      - all
  dupl:
    threshold: 100
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Exclude tests from some linters
    - path: _test\.go
      linters:
        - dupl
        - goconst
        - gocyclo
    # Exclude generated code
    - path: generated\.go
      linters:
        - all
    # Runtime packages may have false positives
    - path: pkg/runtime/
      linters:
        - gosec

severity:
  default-severity: error
  rules:
    - linters:
        - govet
      severity: error
    - linters:
        - errcheck
      severity: error
    - linters:
        - staticcheck
      severity: error
    - linters:
        - gosec
      severity: error